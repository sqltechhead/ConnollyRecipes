name: Sync Wiki

on:
  push:
    branches: [master]
    paths:
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push wiki folder to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the wiki repository
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo

          # Copy all markdown files from wiki/ into the wiki repo
          cp wiki/*.md wiki-repo/

          cd wiki-repo

          git add .

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No wiki changes to sync."
          else
            git commit -m "Sync wiki from repo [skip ci]"
            git push
            echo "Wiki updated."
          fi
